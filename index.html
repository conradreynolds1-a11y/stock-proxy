<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #111418; --card: #161b22; --border: #21262d;
    --accent: #2a78d6; --green: #1baf7a; --red: #e34948; --yellow: #eda100;
    --purple: #9b59b6; --text: #e6edf3; --muted: #7d8590; --dim: #30363d;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Inter', sans-serif; min-height: 100vh; }

  /* Nav */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .nav-brand { font-size: 16px; font-weight: 800; letter-spacing: -0.03em; margin-right: 12px; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab { padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border: 1px solid var(--border); border-radius: 8px; background: none; transition: all 0.15s; }
  .nav-tab.active { color: var(--text); background: var(--card); border-color: var(--accent); }
  .nav-tab:hover { color: var(--text); }
  .nav-key { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-left: auto; }
  .key-input { padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; width: 240px; outline: none; }
  .key-input.active { border-color: var(--green); }
  .key-status { font-size: 11px; white-space: nowrap; }
  .key-status.inactive { color: var(--yellow); }

  /* Layout */
  .page { display: none; max-width: 740px; margin: 0 auto; padding: 24px 20px 48px; }
  .page.active { display: block; }

  /* Search bar */
  .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .search-input { flex: 1; padding: 13px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 15px; font-weight: 600; letter-spacing: 0.04em; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .btn-analyze { padding: 13px 26px; background: linear-gradient(135deg, var(--accent), #1a5fb4); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .btn-analyze:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; }
  .quick-picks { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 0; }
  .quick-btn { padding: 5px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: border-color 0.15s; }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Loading */
  .loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 48px 0; }
  .spinner { width: 44px; height: 44px; border-radius: 50%; border: 3px solid var(--dim); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { color: var(--muted); font-size: 13px; }

  /* Error */
  .error-box { background: rgba(227,73,72,0.1); border: 1px solid rgba(227,73,72,0.3); border-radius: 12px; padding: 14px 16px; color: var(--red); font-size: 13px; margin-top: 16px; }

  /* Cards */
  .card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 12px; }
  .card-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-accent { width: 3px; height: 14px; border-radius: 2px; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .card-body { padding: 0 16px 8px; }

  /* Hero */
  .hero { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 12px; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .hero-ticker { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; }
  .hero-company { font-size: 13px; color: var(--muted); margin: 4px 0 10px; }
  .hero-price { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  .hero-change { font-size: 15px; font-weight: 600; margin-left: 10px; }
  .hero-tags { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .hero-summary { padding: 12px 14px; background: rgba(255,255,255,0.025); border-radius: 10px; margin-top: 14px; font-size: 13px; color: #c8d0de; line-height: 1.7; }
  .hero-summary.bordered { border-left: 3px solid var(--accent); }

  /* Dial */
  .dial-wrap { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
  .dial-wrap svg { width: 96px; height: 96px; }
  .dial-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .dial-score { font-size: 22px; font-weight: 800; line-height: 1; }
  .dial-label { font-size: 9px; color: var(--muted); margin-top: 1px; }

  /* Chip */
  .chip { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; display: inline-block; white-space: nowrap; letter-spacing: 0.02em; }

  /* Metric Row */
  .metric-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .metric-row:last-child { border-bottom: none; }
  .metric-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .metric-label { font-size: 13px; font-weight: 600; color: var(--text); }
  .metric-value { font-size: 14px; font-weight: 700; }
  .metric-explainer { font-size: 11px; color: #9aa0b0; line-height: 1.5; font-style: italic; margin: 3px 0; }
  .metric-benchmark { font-size: 11px; color: var(--accent); line-height: 1.5; margin: 2px 0; opacity: 0.85; }
  .metric-note { font-size: 11px; color: var(--muted); line-height: 1.5; margin: 2px 0; }
  .metric-commentary { margin-top: 5px; padding: 8px 11px; background: rgba(255,255,255,0.025); border-left: 2.5px solid rgba(42,120,214,0.5); border-radius: 0 7px 7px 0; font-size: 12px; color: #c0c8d8; line-height: 1.7; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 0; }
  .stat-item { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .stat-explainer { font-size: 10px; color: #9aa0b0; line-height: 1.5; font-style: italic; margin-bottom: 3px; }
  .stat-benchmark { font-size: 10px; color: var(--accent); line-height: 1.5; opacity: 0.85; margin-bottom: 3px; }
  .stat-commentary { margin-top: 4px; padding: 6px 8px; background: rgba(255,255,255,0.025); border-left: 2px solid rgba(42,120,214,0.4); border-radius: 0 5px 5px 0; font-size: 10px; color: #c0c8d8; line-height: 1.6; }

  /* Risk/Catalyst */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .risk-card { background: rgba(227,73,72,0.06); border: 1px solid rgba(227,73,72,0.15); border-radius: 14px; padding: 14px 16px; }
  .cat-card { background: rgba(27,175,122,0.06); border: 1px solid rgba(27,175,122,0.15); border-radius: 14px; padding: 14px 16px; }
  .rc-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .rc-item { font-size: 12px; color: #bbb; line-height: 1.5; margin-bottom: 6px; display: flex; gap: 6px; }

  /* Entry zones */
  .entry-zone { border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .ez-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .ez-name { font-size: 13px; font-weight: 700; }
  .ez-price { font-size: 14px; font-weight: 700; color: var(--text); }
  .ez-rationale { font-size: 12px; color: #b0bac8; line-height: 1.7; }

  /* SR levels */
  .sr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 0 4px; }
  .sr-item { border-radius: 10px; padding: 11px 13px; }
  .sr-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .sr-price { font-size: 20px; font-weight: 800; color: var(--text); }

  /* Stop/Target */
  .st-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .stop-card { background: rgba(227,73,72,0.08); border: 1px solid rgba(227,73,72,0.25); border-radius: 14px; padding: 14px 16px; }
  .target-card { background: rgba(27,175,122,0.08); border: 1px solid rgba(27,175,122,0.25); border-radius: 14px; padding: 14px 16px; }
  .st-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .st-price { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .st-sub { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .st-note { font-size: 11px; line-height: 1.6; }

  /* Timeframe bars */
  .tf-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .tf-label { font-size: 12px; color: var(--muted); width: 130px; flex-shrink: 0; }
  .tf-bar-track { flex: 1; height: 6px; background: var(--dim); border-radius: 3px; overflow: hidden; }
  .tf-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

  /* Indicator row */
  .ind-row { padding: 13px 0; border-bottom: 1px solid var(--border); }
  .ind-row:last-child { border-bottom: none; }
  .ind-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ind-label { font-size: 13px; font-weight: 600; }
  .ind-value { font-size: 14px; font-weight: 700; }
  .ind-extra { font-size: 11px; color: var(--muted); line-height: 1.5; margin: 2px 0 5px; }
  .ind-commentary { padding: 8px 11px; background: rgba(255,255,255,0.025); border-radius: 0 7px 7px 0; font-size: 12px; color: #c0c8d8; line-height: 1.7; }

  /* Chart */
  .chart-wrap { background: var(--surface); border-radius: 10px; padding: 12px 8px 4px; border: 1px solid var(--border); margin-bottom: 12px; }

  /* Disclaimer */
  .disclaimer { font-size: 11px; color: #444; text-align: center; line-height: 1.6; margin-top: 16px; }

  /* Live badge */
  .live-badge { font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">📊 Stock Tools</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('analyzer')">Stock Analyzer</button>
    <button class="nav-tab" onclick="switchTab('technical')">Technical Analyzer</button>
  </div>
  <div class="nav-key">
    <input class="key-input" id="finnhubKey" placeholder="Paste Finnhub API key..." oninput="updateKeyStatus()" />
    <span class="key-status inactive" id="keyStatus">⚡ No key — add for live prices</span>
  </div>
</nav>

<!-- ── STOCK ANALYZER ──────────────────────────────────────────────────────── -->
<div class="page active" id="page-analyzer">
  <div style="padding-top:8px;">
    <div class="search-row">
      <input class="search-input" id="sa-ticker" placeholder="Enter ticker — NVDA, TSM, META..." maxlength="10"
        onkeydown="if(event.key==='Enter') saAnalyze()" />
      <button class="btn-analyze" id="sa-btn" onclick="saAnalyze()">Analyze</button>
    </div>
    <div class="quick-picks" id="sa-picks"></div>
  </div>
  <div id="sa-loading" style="display:none"><div class="loading"><div class="spinner"></div><div class="loading-msg" id="sa-msg">Fetching data...</div></div></div>
  <div id="sa-error" class="error-box" style="display:none"></div>
  <div id="sa-result" style="display:none"></div>
</div>

<!-- ── TECHNICAL ANALYZER ─────────────────────────────────────────────────── -->
<div class="page" id="page-technical">
  <div style="padding-top:8px;">
    <div class="search-row">
      <input class="search-input" id="ta-ticker" placeholder="Enter ticker — NVDA, TSM, META..." maxlength="10"
        onkeydown="if(event.key==='Enter') taAnalyze()" />
      <button class="btn-analyze" id="ta-btn" onclick="taAnalyze()">Analyze</button>
    </div>
    <div class="quick-picks" id="ta-picks"></div>
  </div>
  <div id="ta-loading" style="display:none"><div class="loading"><div class="spinner"></div><div class="loading-msg" id="ta-msg">Fetching data...</div></div></div>
  <div id="ta-error" class="error-box" style="display:none"></div>
  <div id="ta-result" style="display:none"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const PROXY = 'https://stock-proxy-neon.vercel.app';
const TICKERS = ['NVDA','TSM','META','MSFT','FTNT','VRT','AAPL','AMZN'];

const SIG_COLORS = {
  'Strong Buy':'#1baf7a','Buy':'#4caf88','Neutral':'#eda100','Sell':'#e34948','Strong Sell':'#c0392b',
  'Bullish':'#1baf7a','Bearish':'#e34948','Overbought':'#e34948','Oversold':'#1baf7a',
  'Price Above':'#1baf7a','Price Below':'#e34948','Confirming':'#1baf7a','Diverging':'#e34948',
  'Cheap':'#1baf7a','Undervalued':'#1baf7a','Fair':'#eda100','Expensive':'#e34948','Overvalued':'#e34948',
  'High':'#1baf7a','Medium':'#eda100','Low':'#e34948',
};
const sigColor = s => SIG_COLORS[s] || '#888';
const scoreColor = s => s >= 70 ? '#1baf7a' : s >= 50 ? '#eda100' : '#e34948';
const fmt = n => typeof n === 'number' ? `$${n.toFixed(2)}` : (n || 'N/A');
const fmtN = n => typeof n === 'number' ? n.toFixed(2) : (n || 'N/A');

// ── Nav ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
}

function updateKeyStatus() {
  const key = document.getElementById('finnhubKey').value.trim();
  const inp = document.getElementById('finnhubKey');
  const status = document.getElementById('keyStatus');
  if (key) {
    inp.classList.add('active');
    status.textContent = `✅ Live prices active`;
    status.classList.remove('inactive');
  } else {
    inp.classList.remove('active');
    status.textContent = '⚡ No key — add for live prices';
    status.classList.add('inactive');
  }
}

// ── Quick picks ──────────────────────────────────────────────────────────────
function renderPicks(containerId, inputId, analyzeFn) {
  const c = document.getElementById(containerId);
  TICKERS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'quick-btn';
    b.textContent = t;
    b.onclick = () => { document.getElementById(inputId).value = t; analyzeFn(); };
    c.appendChild(b);
  });
}
renderPicks('sa-picks', 'sa-ticker', saAnalyze);
renderPicks('ta-picks', 'ta-ticker', taAnalyze);

// ── UI helpers ───────────────────────────────────────────────────────────────
function chip(label) {
  if (!label) return '';
  const c = sigColor(label);
  return `<span class="chip" style="background:${c}22;color:${c};border:1px solid ${c}44">${label}</span>`;
}

function dial(score) {
  const color = scoreColor(score);
  const r = 40, circ = 2 * Math.PI * r;
  const offset = circ - (score / 100) * circ;
  return `<div class="dial-wrap">
    <svg viewBox="0 0 96 96"><circle cx="48" cy="48" r="${r}" fill="none" stroke="#30363d" stroke-width="7"/>
    <circle cx="48" cy="48" r="${r}" fill="none" stroke="${color}" stroke-width="7"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 48 48)"/></svg>
    <div class="dial-center"><span class="dial-score" style="color:${color}">${score}</span><span class="dial-label">/ 100</span></div>
  </div>`;
}

function sparkline(prices, support, resistance, currentPrice) {
  if (!prices || prices.length < 2) return '';
  const W=680, H=180, PAD=12;
  const min = Math.min(...prices)*0.995, max = Math.max(...prices)*1.005;
  const range = max - min;
  const toX = i => PAD + (i/(prices.length-1))*(W-PAD*2);
  const toY = v => PAD + ((max-v)/range)*(H-PAD*2);
  const pts = prices.map((p,i) => `${toX(i)},${toY(p)}`).join(' ');
  const fill = `${toX(0)},${H} ` + prices.map((p,i) => `${toX(i)},${toY(p)}`).join(' ') + ` ${toX(prices.length-1)},${H}`;
  const isUp = prices[prices.length-1] >= prices[0];
  const lc = isUp ? '#1baf7a' : '#e34948';
  const cp = currentPrice || prices[prices.length-1];
  let srLines = '';
  if (support && support > min && support < max)
    srLines += `<line x1="${PAD}" y1="${toY(support)}" x2="${W-PAD}" y2="${toY(support)}" stroke="#1baf7a" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
    <text x="${W-PAD-4}" y="${toY(support)-4}" font-size="9" fill="#1baf7a" text-anchor="end">Support $${support}</text>`;
  if (resistance && resistance > min && resistance < max)
    srLines += `<line x1="${PAD}" y1="${toY(resistance)}" x2="${W-PAD}" y2="${toY(resistance)}" stroke="#e34948" stroke-width="1" stroke-dasharray="4 3" opacity="0.7"/>
    <text x="${W-PAD-4}" y="${toY(resistance)-4}" font-size="9" fill="#e34948" text-anchor="end">Resistance $${resistance}</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">
    <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${lc}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${lc}" stop-opacity="0.01"/>
    </linearGradient></defs>
    <polygon points="${fill}" fill="url(#sg)"/>
    ${srLines}
    <polyline points="${pts}" fill="none" stroke="${lc}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${toX(prices.length-1)}" cy="${toY(prices[prices.length-1])}" r="4" fill="${lc}"/>
    <text x="${toX(prices.length-1)+8}" y="${toY(prices[prices.length-1])+4}" font-size="10" fill="${lc}" font-weight="700">$${cp.toFixed(2)}</text>
  </svg>`;
}

// ── Live price fetch ─────────────────────────────────────────────────────────
async function fetchLivePrice(ticker) {
  const key = document.getElementById('finnhubKey').value.trim();
  if (!key) return null;
  try {
    const res = await fetch(`${PROXY}/api/quote?symbol=${ticker}&token=${key}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (json.c && json.c > 0) return { price: json.c, change: json.d, changePct: json.dp };
  } catch(e) { console.warn('Live price failed:', e); }
  return null;
}

async function fetchCandles(ticker) {
  const key = document.getElementById('finnhubKey').value.trim();
  if (!key) return null;
  try {
    const to = Math.floor(Date.now()/1000);
    const from = to - 60*24*3600;
    const res = await fetch(`${PROXY}/api/candle?symbol=${ticker}&from=${from}&to=${to}&token=${key}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (json.s === 'ok' && json.c && json.c.length > 5) return json.c.slice(-30);
  } catch(e) { console.warn('Candles failed:', e); }
  return null;
}

// ── Loading messages ─────────────────────────────────────────────────────────
function startLoading(msgId, messages) {
  let i = 0;
  document.getElementById(msgId).textContent = messages[0];
  return setInterval(() => {
    i = Math.min(i+1, messages.length-1);
    document.getElementById(msgId).textContent = messages[i];
  }, 2200);
}

// ── STOCK ANALYZER ──────────────────────────────────────────────────────────
const SA_SYSTEM = `You are a professional stock analyst. When given a stock ticker, analyze it and return ONLY a valid JSON object. No markdown, no explanation, no preamble.

Return this exact structure:
{
  "company": "Full Company Name",
  "ticker": "TICKER",
  "price": 150.00,
  "sector": "Technology",
  "summary": "2-3 sentence business description",
  "valuation": {
    "trailing_pe": { "value": "number or N/A", "avg_5yr": "number", "sector_avg": "number", "verdict": "Cheap|Fair|Expensive", "note": "one line", "commentary": "2-3 sentence interpretation" },
    "forward_pe": { "value": "number or N/A", "verdict": "Cheap|Fair|Expensive", "note": "one line", "commentary": "2-3 sentence interpretation" },
    "peg_ratio": { "value": "number or N/A", "verdict": "Undervalued|Fair|Overvalued", "note": "one line", "commentary": "2-3 sentence interpretation" },
    "ev_ebitda": { "value": "number or N/A", "verdict": "Cheap|Fair|Expensive", "note": "one line", "commentary": "2-3 sentence interpretation" },
    "price_to_sales": { "value": "number or N/A", "verdict": "Cheap|Fair|Expensive", "note": "one line", "commentary": "2-3 sentence interpretation" }
  },
  "growth": {
    "revenue_growth_yoy": "+X%", "revenue_growth_yoy_commentary": "1-2 sentences",
    "eps_growth_yoy": "+X%", "eps_growth_yoy_commentary": "1-2 sentences",
    "eps_growth_forward": "+X%", "eps_growth_forward_commentary": "1-2 sentences",
    "revenue_growth_forward": "+X%", "revenue_growth_forward_commentary": "1-2 sentences"
  },
  "profitability": {
    "gross_margin": "X%", "gross_margin_commentary": "1-2 sentences",
    "operating_margin": "X%", "operating_margin_commentary": "1-2 sentences",
    "net_margin": "X%", "net_margin_commentary": "1-2 sentences",
    "roe": "X%", "roe_commentary": "1-2 sentences",
    "roic": "X%", "roic_commentary": "1-2 sentences"
  },

function statItem(label, value, color, commentary) {

async function saAnalyze() {

  document.getElementById('sa-btn').disabled = true;

  const msgs = ['Fetching live price...','Running valuation models...','Analyzing financials...','Scoring investment case...','Almost done...'];
  const iv = startLoading('sa-msg', msgs);

  try {
    // Fetch live price
    const live = await fetchLivePrice(t);
    const priceCtx = live
      ? `The CURRENT LIVE PRICE is exactly $${live.price.toFixed(2)} (change: ${live.change >= 0 ? '+' : ''}${live.change?.toFixed(2)}, ${live.changePct?.toFixed(2)}%). You MUST use $${live.price.toFixed(2)} as the price field in the JSON — do not use any other price.`
      : 'Use your most current knowledge for the price.';

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6', max_tokens: 4000,
        system: SA_SYSTEM,
        messages: [{ role: 'user', content: `Analyze ${t}. ${priceCtx} Return only the JSON.` }]

    });

    const text = json.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const s = clean.indexOf('{'), e = clean.lastIndexOf('}');

        <div class="sr-price">$${sr.strong_resistance?.toFixed(2)}</div>
      </div>
      <div class="sr-item" style="background:rgba(227,73,72,0.05);border:1px solid rgba(227,73,72,0.12)">
        <div class="sr-label" style="color:#e38a88">Resistance</div>
        <div class="sr-price">$${sr.resistance?.toFixed(2)}</div>
      </div>
      <div class="sr-item" style="background:rgba(27,175,122,0.05);border:1px solid rgba(27,175,122,0.12)">
        <div class="sr-label" style="color:#7acfad">Support</div>
        <div class="sr-price">$${sr.support?.toFixed(2)}</div>
      </div>
      <div class="sr-item" style="background:rgba(27,175,122,0.08);border:1px solid rgba(27,175,122,0.2)">
        <div class="sr-label" style="color:#1baf7a">Strong Support</div>
        <div class="sr-price">$${sr.strong_support?.toFixed(2)}</div>
      </div>
    </div>
    <div style="padding:10px 12px;background:rgba(237,161,0,0.08);border:1px solid rgba(237,161,0,0.2);border-radius:9px;margin-bottom:10px">
      <p style="font-size:12px;color:#c8c0a8;margin:0 0 6px;line-height:1.65"><span style="color:#1baf7a;font-weight:600">Support: </span>${sr.support_explanation}</p>
      <p style="font-size:12px;color:#c8c0a8;margin:0;line-height:1.65"><span style="color:#e34948;font-weight:600">Resistance: </span>${sr.resistance_explanation}</p>
    </div>
  `);

  // Stop loss & Target
  const sl = d.stop_loss || {};
  const pt = d.price_target_technical || {};
  html += `<div class="st-grid">
    <div class="stop-card">
      <div class="st-label" style="color:#e34948">Stop Loss</div>
      <div class="st-price">$${sl.value?.toFixed(2)}</div>
      <div class="st-note" style="color:#c0b0b0">${sl.rationale}</div>
    </div>
    <div class="target-card">
      <div class="st-label" style="color:#1baf7a">Price Target</div>
      <div class="st-price">$${pt.value?.toFixed(2)}</div>
      <div class="st-sub" style="color:#1baf7a">Risk/Reward: ${d.risk_reward}</div>
      <div class="st-note" style="color:#b0c0b0">${pt.rationale}</div>
    </div>
  </div>`;

  // Pattern
  if (d.pattern && d.pattern !== 'No Clear Pattern') {
    html += cardWrap('Chart Pattern', '#9b59b6', `<div style="padding:10px 0 4px">
      <div style="font-size:15px;font-weight:700;margin-bottom:8px">${d.pattern}</div>
      <p style="font-size:13px;color:#b8c0cc;line-height:1.7">${d.pattern_explanation}</p>
    </div>`);
  }

  // Indicators
  const indRows = [
    ['RSI (14)', fmtN(ind.rsi?.value), ind.rsi?.signal, ind.rsi?.interpretation],
    ['MACD', `${fmtN(ind.macd?.value)} / Signal: ${fmtN(ind.macd?.signal_line)}`, ind.macd?.signal, ind.macd?.interpretation],
    ['50-Day MA', fmt(ind.moving_avg_50?.value), ind.moving_avg_50?.signal, ind.moving_avg_50?.interpretation],
    ['200-Day MA', fmt(ind.moving_avg_200?.value), ind.moving_avg_200?.signal, ind.moving_avg_200?.interpretation],
    ['Bollinger Bands', `Upper: ${fmt(ind.bollinger?.upper)} · Lower: ${fmt(ind.bollinger?.lower)}`, ind.bollinger?.signal, ind.bollinger?.interpretation],
    ['Volume', ind.volume?.current_vs_avg, ind.volume?.signal, ind.volume?.interpretation],
    ['Stochastic', `%K: ${fmtN(ind.stochastic?.k)} · %D: ${fmtN(ind.stochastic?.d)}`, ind.stochastic?.signal, ind.stochastic?.interpretation],
    ['ATR', fmt(ind.atr?.value), null, ind.atr?.interpretation],
  ];

  html += cardWrap('Technical Indicators', '#2a78d6', indRows.map(([label, value, signal, interp]) => {
    const c = sigColor(signal);
    const extra = IND_EXTRA[label] ? `<div class="ind-extra">${IND_EXTRA[label]}</div>` : '';
    const cm = interp ? `<div class="ind-commentary" style="border-left:2.5px solid ${c}44">${interp}</div>` : '';
    return `<div class="ind-row">
      <div class="ind-top">
        <span class="ind-label">${label}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="ind-value">${value||'N/A'}</span>${signal?chip(signal):''}
        </div>
      </div>
      ${extra}${cm}
    </div>`;
  }).join(''));

  html += `<p class="disclaimer">Technical analysis is probabilistic, not predictive. Not financial advice.</p>`;

  const el = document.getElementById('ta-result');
  el.innerHTML = html;
  el.style.display = 'block';
}
</script>
</body>
</html>
